# 后端项目业务场景配置
name: backend
description: "后端项目审查配置"

# 继承的基础规则
extends:
  - security
  - quality
  - performance

# 后端项目额外关注点
custom_prompt: |
  后端项目额外关注:
  - **API 安全**: 参数验证、权限校验、敏感数据过滤
  - **数据库性能**: N+1 查询、索引优化、事务范围
  - **错误处理**: 异常捕获、错误日志、用户友好提示
  - **并发安全**: 线程安全、锁粒度、资源竞争
  - **依赖注入**: 模块解耦、测试友好